name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo_sqlite, sqlite3, openssl, bcmath, ctype, json
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare app
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force

      - name: Run tests
        run: php artisan test

  spa:
    name: Console SPA build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & build SPA
        # `npm install` (not `npm ci`): the committed lockfile is generated on Windows and omits
        # Linux-only optional deps (@emnapi/*), a known npm cross-OS gap that breaks `npm ci`.
        run: |
          npm --prefix resources/console install --no-audit --no-fund
          npm --prefix resources/console run lint
          npm --prefix resources/console run build
