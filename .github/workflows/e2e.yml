name: e2e

# Label-gated: the full end-to-end Playwright run (boots the whole app + a browser) is expensive, so it
# only runs when the PR carries the `testE2E` label. This lets you do fast Copilot review rounds first and
# pay for E2E once the diff is clean. See .claude/rules/rule-ship-workflow.md.
on:
  pull_request:
    types: [labeled, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright golden path
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'testE2E')
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, sqlite3, openssl, bcmath, ctype, json
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare app (key, migrate, seed super-admin)
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate:fresh --seed --force

      - name: Build the console SPA
        run: |
          npm --prefix resources/console ci
          npm --prefix resources/console run build

      - name: Install Playwright + browsers
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E (golden path)
        run: npx playwright test
        env:
          CI: 'true'

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
